# Production — builds and pushes the production Docker image on production merges and version tags.

name: Production

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [production]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/astrokat

jobs:
  production:
    environment: production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=semver,pattern=v{{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Deploy production image
        env:
          RANCHER_URL: ${{ secrets.RANCHER_URL }}
          RANCHER_TOKEN: ${{ secrets.RANCHER_TOKEN }}
          RANCHER_PROJECT_ID: ${{ secrets.RANCHER_PROJECT_ID }}
          RANCHER_NAMESPACE: ${{ secrets.RANCHER_NAMESPACE }}
          RANCHER_WORKLOAD: ${{ secrets.RANCHER_WORKLOAD }}
        run: |
          if [ -z "$RANCHER_URL" ] || [ -z "$RANCHER_TOKEN" ]; then
            echo "Rancher secrets not configured — skipping deploy"
            exit 0
          fi
          curl -sS -X POST \
            -H "Authorization: Bearer $RANCHER_TOKEN" \
            "$RANCHER_URL/v3/project/$RANCHER_PROJECT_ID/workloads/deployment:$RANCHER_NAMESPACE:$RANCHER_WORKLOAD?action=redeploy"
